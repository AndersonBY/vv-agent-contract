name: Release contract

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag and contract version
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 -c 'import json; print(json.load(open("contract.json"))["version"])')"
          test "$GITHUB_REF_NAME" = "v$version"

      - name: Validate and test
        run: |
          python3 scripts/contractctl.py validate
          python3 -m unittest discover -s tests

      - name: Build release assets
        run: python3 scripts/contractctl.py build --output-dir dist --revision "$GITHUB_SHA"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            dist/vv-agent-contract-*.zip \
            dist/vv-agent-contract-*.zip.sha256 \
            dist/vv-agent-contract-*.release.json \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
